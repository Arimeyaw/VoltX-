<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VoltX — Admin Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <header>
      <nav class="container">
        <div class="nav-logo">Volt<span>X</span></div>
        <div class="nav-links">
          <a href="index.html">Site</a>
          <a class="active">Admin</a>
        </div>
        <div class="nav-actions">
          <a class="btn" href="index.html">← View Store</a>
        </div>
      </nav>
    </header>

    <main class="container admin-main">
      <h1>Admin Dashboard</h1>

      <section class="admin-panel">
        <div class="admin-col">
          <h2>Products</h2>
          <div class="admin-actions-row">
            <button class="btn" id="refreshProducts">Refresh</button>
            <button class="btn btn-primary" id="openAdd">+ Add Product</button>
          </div>

          <div class="table-wrap">
            <table id="productsTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Image</th>
                  <th>Brand</th>
                  <th>Name</th>
                  <th>Category</th>
                  <th>Tag</th>
                  <th>Price</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>

          <div id="addForm" class="admin-modal" style="display: none">
            <h3>Add New Product</h3>
            <div class="form-row-col">
              <input id="p-brand" placeholder="Brand" />
              <input id="p-name" placeholder="Name" />
              <input id="p-image" placeholder="Image URL" />
              <input id="p-category" placeholder="Category" />
              <input id="p-tag" placeholder="Tag" />
              <input id="p-price" placeholder="Price" />
            </div>
            <div style="margin-top: 8px">
              <button class="btn btn-primary" id="addProductBtn">Add</button>
              <button class="btn" id="cancelAdd">Cancel</button>
            </div>
          </div>
        </div>

        <div class="admin-col">
          <h2>Orders</h2>
          <div id="ordersList">No orders found.</div>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <div style="text-align: center; padding: 20px; color: #999">
          VoltX Admin • Local demo
        </div>
      </div>
    </footer>

    <script src="products.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
